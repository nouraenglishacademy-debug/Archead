<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archead - أرشيف المعرفة العربي</title>

  <!-- Tailwind CSS & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-900/90 backdrop-blur sticky top-0 z-40 p-4">
    <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-2 cursor-pointer" onclick="resetHome()">
        <span class="text-2xl">🏛️</span>
        <h1 class="text-xl font-bold text-indigo-400">Archead</h1>
      </div>
      
      <!-- Search Bar -->
      <div class="flex w-full sm:w-2/3 gap-2">
        <input id="searchInput" type="text" placeholder="ابحث عن أي شيء في الأرشيف..." 
               class="w-full px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-slate-100 focus:outline-none focus:border-indigo-500 transition text-sm">
        
        <button onclick="performSearch()" 
                class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-bold transition text-sm whitespace-nowrap shadow-lg shadow-indigo-600/20">
          بحث 🔍
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="max-w-5xl w-full mx-auto p-4 flex-grow flex flex-col">
    <div id="welcomeScreen" class="text-center py-20 space-y-3 my-auto">
      <div class="text-6xl mb-2">🌐</div>
      <h2 class="text-xl font-bold text-slate-200">مرحباً بك في Archead</h2>
      <p class="text-xs text-slate-400 max-w-sm mx-auto">
        أدخل كلمة البحث في الأعلى لتصفح وعرض النتائج مباشرة وبكل امان متخطياً قيود المتصفحات الحديثة.
      </p>
    </div>

    <!-- Frame Container for Results/Preview -->
    <div id="resultsContainer" class="hidden flex-grow w-full h-[75vh] bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-2xl relative">
      <div class="bg-slate-900 px-4 py-2 border-b border-slate-800 flex justify-between items-center text-xs text-slate-400">
        <span id="resultTitle">نتائج البحث المباشرة</span>
        <button onclick="resetHome()" class="text-rose-400 hover:text-rose-300 font-bold">إغلاق النتائج ✕</button>
      </div>
      <iframe id="resultsFrame" class="w-full h-[calc(100%-37px)] border-0 bg-white" src=""></iframe>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800 bg-slate-900/50 py-4 text-center text-xs text-slate-500">
    <p>© 2026 Archead. جميع الحقوق محفوظة.</p>
  </footer>

  <!-- Main Logic -->
  <script>
    function resetHome() {
      document.getElementById('searchInput').value = '';
      document.getElementById('welcomeScreen').classList.remove('hidden');
      document.getElementById('resultsContainer').classList.add('hidden');
      document.getElementById('resultsFrame').src = '';
    }

    function performSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
        alert('يرجى كتابة كلمة البحث أولاً.');
        return;
      }

      const welcomeScreen = document.getElementById('welcomeScreen');
      const resultsContainer = document.getElementById('resultsContainer');
      const resultsFrame = document.getElementById('resultsFrame');
      const resultTitle = document.getElementById('resultTitle');

      welcomeScreen.classList.add('hidden');
      resultsContainer.classList.remove('hidden');
      
      resultTitle.innerText = `نتائج البحث عن: "${query}"`;

      // استخدام واجهة المعرض المضمنة للأرشيف التي لا تعرض أخطاء fetch نهائياً
      const searchUrl = `https://archive.org/search?query=${encodeURIComponent(query)}&output=embed`;
      resultsFrame.src = searchUrl;
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => { 
      if (e.key === 'Enter') performSearch(); 
    });
  </script>

</body>
</html>
