<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة أرشيف الإنترنت الشاملة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50 p-4">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-2 cursor-pointer" onclick="closeViewer()">
        <span class="text-2xl">🏛️</span>
        <h1 class="text-xl font-bold text-indigo-400">أرشيف المعرفة العربي</h1>
      </div>
      
      <!-- Search Bar -->
      <div class="flex w-full md:w-2/3 gap-2">
        <select id="mediaType" class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-xl px-3 focus:outline-none focus:border-indigo-500">
          <option value="all">الكل</option>
          <option value="web">مواقع ويب</option>
          <option value="texts">كتب ومقالات</option>
          <option value="movies">فيديوهات</option>
          <option value="audio">صوتيات</option>
          <option value="software">برمجيات</option>
        </select>

        <input id="searchInput" type="text" placeholder="ابحث عن موقع، كتاب، فيديو، أو ملف..." 
               class="w-full px-4 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-slate-100 focus:outline-none focus:border-indigo-500 transition text-sm">
        
        <button onclick="performSearch()" 
                class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-bold transition text-sm whitespace-nowrap">
          بحث
        </button>
      </div>
    </div>
  </header>

  <!-- Embedded Viewer Modal -->
  <div id="viewerContainer" class="hidden fixed inset-0 bg-slate-950/95 z-50 flex flex-col p-4">
    <div class="flex justify-between items-center pb-3 border-b border-slate-800 mb-3">
      <h2 id="viewerTitle" class="text-sm font-bold text-indigo-400 truncate max-w-md">معاينة المحتوى</h2>
      <div class="flex gap-2">
        <a id="externalLink" href="#" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded-lg font-bold transition flex items-center gap-1">
          <span>فتح في تبويب جديد</span> ↗
        </a>
        <button onclick="closeViewer()" class="bg-rose-600 hover:bg-rose-500 text-white text-xs px-3 py-1.5 rounded-lg font-bold transition">إغلاق المعاينة ✕</button>
      </div>
    </div>
    
    <div class="flex-grow w-full h-full bg-slate-900 rounded-xl overflow-hidden border border-slate-800 relative">
      <iframe id="contentFrame" class="w-full h-full border-0 bg-white" src="" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Main Grid Area -->
  <main class="max-w-6xl w-full mx-auto p-4 flex-grow">
    <div id="status" class="text-center py-8 text-slate-400 text-sm">
      أدخل كلمة البحث أو رابط الموقع للبدء في الاستكشاف...
    </div>
    <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <script>
    async function performSearch() {
      closeViewer();
      const query = document.getElementById('searchInput').value.trim();
      const mediaType = document.getElementById('mediaType').value;
      const statusDiv = document.getElementById('status');
      const resultsGrid = document.getElementById('resultsGrid');

      if (!query) {
        statusDiv.innerHTML = 'يرجى إدخال نص للبحث عنه.';
        return;
      }

      resultsGrid.innerHTML = '';
      statusDiv.innerHTML = '<div class="animate-pulse">جاري الاتصال بقواعد البيانات...</div>';

      if (mediaType === 'web' || (query.includes('.') && !query.includes(' '))) {
        await searchWayback(query);
      } else {
        await searchGeneralArchive(query, mediaType);
      }
    }

    async function searchWayback(url) {
      const statusDiv = document.getElementById('status');
      const resultsGrid = document.getElementById('resultsGrid');
      const cleanUrl = url.replace(/^(https?:\/\/)?(www\.)?/, '');

      try {
        const response = await fetch(`https://archive.org/wayback/available?url=${encodeURIComponent(cleanUrl)}`);
        const data = await response.json();

        if (data.archived_snapshots && data.archived_snapshots.closest) {
          const snapshot = data.archived_snapshots.closest;
          const formattedDate = snapshot.timestamp.replace(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/, '$1-$2-$3 الساعة $4:$5');
          
          statusDiv.innerHTML = `تم العثور على أحدث نسخة محفوظة للموقع:`;

          resultsGrid.innerHTML = `
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between hover:border-indigo-500/50 transition">
              <div>
                <span class="inline-block bg-indigo-500/10 text-indigo-400 text-xs px-2.5 py-1 rounded-full mb-3">موقع ويب</span>
                <h3 class="font-bold text-lg text-slate-100 break-all mb-2">${cleanUrl}</h3>
                <p class="text-xs text-slate-400 mb-4">آخر أرشفة: ${formattedDate}</p>
              </div>
              <button onclick="openViewer('${snapshot.url}', '${cleanUrl}')" 
                      class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-xl text-sm transition">
                معاينة داخل الموقع 👁️
              </button>
            </div>
          `;
        } else {
          statusDiv.innerHTML = 'لم يتم العثور على أرشفة لهذا الرابط، جاري البحث في المكتبة العامة...';
          await searchGeneralArchive(url, 'all');
        }
      } catch (err) {
        statusDiv.innerHTML = 'حدث خطأ أثناء الاتصال بالأرشيف.';
      }
    }

    async function searchGeneralArchive(query, mediaType) {
      const statusDiv = document.getElementById('status');
      const resultsGrid = document.getElementById('resultsGrid');

      let mediaQuery = (mediaType !== 'all' && mediaType !== 'web') ? ` AND mediatype:${mediaType}` : '';
      const apiUrl = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(query)}${mediaQuery}&fl[]=identifier,title,description,mediatype&sort[]=downloads+desc&rows=21&page=1&output=json`;

      try {
        const response = await fetch(apiUrl);
        const data = await response.json();
        const docs = data.response ? data.response.docs : [];

        if (!docs || docs.length === 0) {
          statusDiv.innerHTML = 'لم يتم العثور على نتائج مطابقة.';
          return;
        }

        statusDiv.innerHTML = `عرض ${docs.length} نتيجة:`;

        docs.forEach(item => {
          const title = item.title || item.identifier;
          const desc = item.description ? (Array.isArray(item.description) ? item.description[0] : item.description) : 'لا يوجد وصف.';
          const cleanDesc = desc.replace(/<[^>]*>?/gm, '').slice(0, 90) + '...';
          const type = translateType(item.mediatype);
          
          const embedUrl = `https://archive.org/embed/${item.identifier}`;
          const thumbnailUrl = `https://archive.org/services/img/${item.identifier}`;

          const card = document.createElement('div');
          card.className = "bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex flex-col justify-between hover:border-slate-700 transition";
          
          card.innerHTML = `
            <div>
              <div class="h-40 bg-slate-950 relative overflow-hidden flex items-center justify-center border-b border-slate-800">
                <img src="${thumbnailUrl}" alt="${title}" class="object-cover w-full h-full opacity-80" onerror="this.src='https://via.placeholder.com/300x150/0f172a/64748b?text=Archive'">
                <span class="absolute top-2 right-2 bg-slate-900/90 backdrop-blur text-indigo-400 text-xs px-2.5 py-1 rounded-md border border-slate-700">${type}</span>
              </div>
              <div class="p-4">
                <h3 class="font-bold text-slate-200 line-clamp-1 mb-2 text-sm" title="${title}">${title}</h3>
                <p class="text-xs text-slate-400 line-clamp-2">${cleanDesc}</p>
              </div>
            </div>
            <div class="p-4 pt-0">
              <button onclick="openViewer('${embedUrl}', '${title.replace(/'/g, "\\'")}')" 
                      class="w-full bg-slate-800 hover:bg-indigo-600 text-slate-200 hover:text-white font-bold py-2 rounded-xl text-xs transition">
                معاينة / تشغيل 👁️
              </button>
            </div>
          `;
          resultsGrid.appendChild(card);
        });

      } catch (err) {
        statusDiv.innerHTML = 'حدث خطأ أثناء جلب النتائج.';
      }
    }

    function openViewer(url, title) {
      const container = document.getElementById('viewerContainer');
      const frame = document.getElementById('contentFrame');
      const titleElem = document.getElementById('viewerTitle');
      const externalLink = document.getElementById('externalLink');

      titleElem.innerText = title;
      externalLink.href = url;
      
      // التمرير عبر بروكسي بايثون لتخطي حظر X-Frame-Options
      if(url.includes('web.archive.org') || url.includes('archive.org/web/')) {
        frame.src = `/proxy?url=${encodeURIComponent(url)}`;
      } else {
        frame.src = url;
      }
      
      container.classList.remove('hidden');
    }

    function closeViewer() {
      const container = document.getElementById('viewerContainer');
      const frame = document.getElementById('contentFrame');
      container.classList.add('hidden');
      frame.src = '';
    }

    function translateType(type) {
      const types = { 'texts': '📚 كتاب', 'movies': '🎬 فيديو', 'audio': '🎧 صوت', 'software': '💻 برنامج', 'web': '🌐 موقع' };
      return types[type] || '📁 ملف';
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
  </script>

</body>
  </html>
