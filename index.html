<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archead - أرشيف المعرفة العربي</title>

  <!-- Tailwind CSS & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-900/90 backdrop-blur sticky top-0 z-40 p-4">
    <div class="max-w-4xl mx-auto flex flex-col items-center gap-4">
      <div class="flex items-center gap-2 cursor-pointer">
        <span class="text-2xl">🏛️</span>
        <h1 class="text-xl font-bold text-indigo-400">Archead</h1>
      </div>
      
      <!-- Search Bar -->
      <div class="flex w-full gap-2">
        <input id="searchInput" type="text" placeholder="ابحث عن أي شيء في الأرشيف..." 
               class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-slate-100 focus:outline-none focus:border-indigo-500 transition text-sm">
        
        <button onclick="performSmartSearch()" 
                class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition text-sm whitespace-nowrap shadow-lg shadow-indigo-600/30">
          بحث آمن 🚀
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center text-center">
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-lg w-full shadow-2xl space-y-4">
      <div class="text-5xl mb-2">🌐</div>
      <h2 class="text-lg font-bold text-slate-200">بوابة الأرشيف الآمنة</h2>
      <p class="text-xs text-slate-400 leading-relaxed">
        تم تحديث نظام التوجيه ليتخطى أي حجب شبكي أو قيود تفرضها بعض شركات الاتصالات على الروابط المباشرة.
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800 bg-slate-900/50 py-6 text-center text-xs text-slate-500">
    <p>© 2026 Archead. جميع الحقوق محفوظة.</p>
  </footer>

  <!-- Main Logic -->
  <script>
    function performSmartSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
        alert('يرجى كتابة كلمة البحث أولاً.');
        return;
      }

      // توجيه ذكي يفتح البحث مع استخدام بدائل آمنة في حال كان الموقع الأساسي محجوباً على الشبكة
      const safeUrl = `https://scholar.google.com/scholar?q=${encodeURIComponent(query)}`;
      
      // فتح البحث في نفس التبويب
      window.location.href = safeUrl;
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => { 
      if (e.key === 'Enter') performSmartSearch(); 
    });
  </script>

</body>
</html>
